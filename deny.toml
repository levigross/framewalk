# cargo-deny configuration for framewalk.
# Run: cargo deny check

[graph]
targets = [
    "x86_64-unknown-linux-musl",
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-musl",
    "aarch64-unknown-linux-gnu",
]

[advisories]
# paste is unmaintained (RUSTSEC-2024-0436) but it's a transitive dep
# of rmcp that we can't control. No vulnerability, just unmaintained.
ignore = [
    { id = "RUSTSEC-2024-0436", reason = "transitive dep of rmcp; no vulnerability" },
]

[licenses]
# framewalk is Apache-2.0 licensed; deps must use compatible licenses.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
# Workspace path deps are "wildcards" — that's fine for an unpublished workspace.
wildcards = "allow"
# No crypto crates in the base build — keeps the static musl binary lean
# and avoids openssl-sys / ring footguns.
deny = [
    { crate = "openssl-sys", reason = "breaks static musl builds; use rustls if TLS ever needed" },
    { crate = "openssl", reason = "breaks static musl builds" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
