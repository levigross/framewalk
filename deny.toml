# cargo-deny configuration for framewalk.
# Run: cargo deny check

[graph]
targets = [
    "x86_64-unknown-linux-musl",
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-musl",
    "aarch64-unknown-linux-gnu",
]

[advisories]
# bincode 1.x is "complete" per upstream (RUSTSEC-2025-0004) and pulled in
# transitively via steel-core 0.8.2. No vulnerability, just an unmaintained
# notice from a repo that considers its 1.x branch finished.
ignore = [
    { id = "RUSTSEC-2025-0141", reason = "bincode 1.x transitive dep of steel-core; unmaintained but not vulnerable" },
]

[licenses]
# framewalk is Apache-2.0 licensed; deps must use compatible licenses.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
# Workspace path deps are "wildcards" — that's fine for an unpublished workspace.
wildcards = "allow"
# No crypto crates in the base build — keeps the static musl binary lean
# and avoids openssl-sys / ring footguns.
deny = [
    { crate = "openssl-sys", reason = "breaks static musl builds; use rustls if TLS ever needed" },
    { crate = "openssl", reason = "breaks static musl builds" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
